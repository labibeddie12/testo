<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LBtradez - Trader Journey Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #05070d;
  --panel: rgba(255, 255, 255, 0.075);
  --panel-strong: rgba(255, 255, 255, 0.12);
  --border: rgba(255, 255, 255, 0.14);
  --text: #f7f7fb;
  --muted: rgba(247, 247, 251, 0.62);
  --soft: rgba(247, 247, 251, 0.1);
  --gold: #f5c542;
  --gold-2: #ffdd72;
  --green: #38e28b;
  --red: #ff5d73;
  --orange: #ffab4a;
  --blue: #7aa7ff;
  --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
  --radius: 24px;
  --radius-sm: 16px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(245, 197, 66, 0.18), transparent 32%),
    radial-gradient(circle at 85% 18%, rgba(64, 105, 255, 0.16), transparent 35%),
    linear-gradient(135deg, #05070d 0%, #090e1b 55%, #06070b 100%);
  color: var(--text);
}

button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
.hidden { display: none !important; }
.noise {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.18;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.3'/%3E%3C/svg%3E");
}
.glass {
  background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
}
.auth-screen {
  min-height: 100vh;
  display: grid;
  grid-template-columns: minmax(0, 1.25fr) minmax(360px, 0.75fr);
  gap: 32px;
  padding: 36px;
  align-items: stretch;
}
.auth-art {
  position: relative;
  overflow: hidden;
  border-radius: 36px;
  min-height: 640px;
  display: flex;
  align-items: flex-end;
  padding: 48px;
  background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.10);
}
.brand-block { position: relative; max-width: 760px; z-index: 2; }
.logo-mark {
  width: 68px;
  height: 68px;
  display: grid;
  place-items: center;
  border-radius: 22px;
  font-weight: 900;
  letter-spacing: -0.06em;
  color: #090907;
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  box-shadow: 0 20px 60px rgba(245,197,66,0.24);
}
.logo-mark.small { width: 46px; height: 46px; border-radius: 15px; font-size: 15px; }
.eyebrow {
  margin: 0 0 8px;
  color: var(--gold-2);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 12px;
  font-weight: 800;
}
.auth-art h1 {
  margin: 18px 0 18px;
  font-size: clamp(42px, 6vw, 82px);
  line-height: 0.92;
  letter-spacing: -0.075em;
}
.muted { color: var(--muted); line-height: 1.65; }
.tiny { color: var(--muted); font-size: 12px; line-height: 1.45; }
.auth-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 26px; }
.auth-stats span {
  padding: 12px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.11);
}
.orb { position: absolute; border-radius: 999px; filter: blur(16px); opacity: 0.64; }
.orb-one { width: 360px; height: 360px; top: 8%; right: 10%; background: rgba(245,197,66,0.16); }
.orb-two { width: 280px; height: 280px; bottom: 10%; left: 12%; background: rgba(56,226,139,0.12); }
.auth-panel {
  border-radius: 32px;
  padding: 22px;
  align-self: center;
  width: 100%;
  max-width: 460px;
  justify-self: center;
}
.tabs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 18px;
  padding: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 18px;
}
.tab {
  border: 0;
  border-radius: 14px;
  padding: 11px 10px;
  background: transparent;
  color: var(--muted);
  font-weight: 700;
}
.tab.active { background: rgba(245,197,66,0.17); color: var(--gold-2); }
.auth-form h2 { margin: 0; font-size: 28px; letter-spacing: -0.04em; }
.auth-form .muted { margin: 6px 0 12px; }

.auth-message {
  margin: 14px 0 4px;
  padding: 12px 14px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 700;
  line-height: 1.45;
  background: rgba(122, 167, 255, 0.12);
  border: 1px solid rgba(122, 167, 255, 0.28);
  color: #dbe6ff;
}
.auth-message.success {
  background: rgba(56, 226, 139, 0.12);
  border-color: rgba(56, 226, 139, 0.30);
  color: #c9ffdf;
}
.auth-message.error {
  background: rgba(255, 93, 115, 0.12);
  border-color: rgba(255, 93, 115, 0.30);
  color: #ffd0d7;
}
.auth-message.warning {
  background: rgba(255, 171, 74, 0.12);
  border-color: rgba(255, 171, 74, 0.30);
  color: #ffe1b8;
}
button:disabled {
  opacity: 0.68;
  cursor: not-allowed;
}

label { display: grid; gap: 7px; color: rgba(247,247,251,0.86); font-size: 13px; font-weight: 700; margin: 12px 0; }
input, select, textarea {
  width: 100%;
  color: var(--text);
  background: rgba(3, 5, 12, 0.45);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 15px;
  padding: 13px 14px;
  outline: none;
  transition: 0.2s ease;
}
textarea { resize: vertical; min-height: 90px; }
input:focus, select:focus, textarea:focus { border-color: rgba(245,197,66,0.75); box-shadow: 0 0 0 4px rgba(245,197,66,0.12); }
.btn {
  border: 1px solid transparent;
  border-radius: 15px;
  padding: 12px 16px;
  font-weight: 850;
  transition: 0.2s ease;
  color: var(--text);
  background: var(--soft);
}
.btn:hover { transform: translateY(-1px); }
.btn.primary { color: #080809; background: linear-gradient(135deg, var(--gold), var(--gold-2)); box-shadow: 0 14px 36px rgba(245,197,66,0.22); }
.btn.ghost { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); }
.btn.soft { background: rgba(122,167,255,0.12); border-color: rgba(122,167,255,0.22); color: #d9e5ff; }
.btn.danger { background: rgba(255,93,115,0.12); border-color: rgba(255,93,115,0.22); color: #ffd8de; }
.btn.full { width: 100%; margin-top: 10px; }
.app-shell {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 22px;
  min-height: 100vh;
  padding: 22px;
}
.sidebar {
  position: sticky;
  top: 22px;
  height: calc(100vh - 44px);
  border-radius: 28px;
  padding: 20px;
  display: flex;
  flex-direction: column;
}
.side-brand { display: flex; align-items: center; gap: 12px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.09); }
.side-brand h3 { margin: 0; letter-spacing: -0.04em; }
.side-brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
.nav-list { display: grid; gap: 8px; margin: 22px 0; }
.nav-btn {
  width: 100%;
  display: flex;
  gap: 12px;
  align-items: center;
  text-align: left;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  padding: 12px 12px;
  border-radius: 16px;
  font-weight: 780;
}
.nav-btn.active { color: var(--text); background: rgba(245,197,66,0.14); border-color: rgba(245,197,66,0.18); }
.nav-icon { width: 27px; height: 27px; display: grid; place-items: center; border-radius: 10px; background: rgba(255,255,255,0.07); }
.side-footer { margin-top: auto; }
.workspace { min-width: 0; padding-bottom: 90px; }
.topbar {
  min-height: 94px;
  border-radius: 28px;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
}
.topbar h1 { margin: 0; font-size: clamp(26px, 4vw, 42px); letter-spacing: -0.055em; }
.user-pill {
  padding: 10px 14px;
  border-radius: 18px;
  background: rgba(255,255,255,0.07);
  display: grid;
  gap: 3px;
  text-align: right;
}
.user-pill span:first-child { font-weight: 800; }
.user-pill span:last-child { color: var(--muted); font-size: 12px; }
.page-content { padding: 22px 0; display: grid; gap: 22px; }
.grid { display: grid; gap: 16px; }
.grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
.grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.card {
  border-radius: 24px;
  padding: 20px;
  background: rgba(255,255,255,0.065);
  border: 1px solid rgba(255,255,255,0.105);
  box-shadow: 0 14px 48px rgba(0,0,0,0.18);
}
.card h3 { margin: 0 0 10px; letter-spacing: -0.03em; }
.metric-card { min-height: 132px; position: relative; overflow: hidden; }
.metric-card:after {
  content: "";
  position: absolute;
  right: -40px;
  top: -40px;
  width: 110px;
  height: 110px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
}
.metric-label { color: var(--muted); font-weight: 750; font-size: 13px; }
.metric-value { margin-top: 12px; font-size: clamp(24px, 3vw, 35px); font-weight: 900; letter-spacing: -0.055em; }
.metric-sub { margin-top: 8px; color: var(--muted); font-size: 12px; }
.toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
.toolbar h2 { margin: 0; letter-spacing: -0.04em; }
.table-wrap { overflow-x: auto; border-radius: 20px; border: 1px solid rgba(255,255,255,0.095); }
table { width: 100%; border-collapse: collapse; min-width: 780px; }
th, td { padding: 14px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: left; font-size: 13px; vertical-align: top; }
th { color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em; font-size: 11px; background: rgba(255,255,255,0.04); }
tr:last-child td { border-bottom: 0; }
.tag { display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 800; background: rgba(255,255,255,0.08); color: var(--text); }
.tag.green { background: rgba(56,226,139,0.12); color: #baffd9; }
.tag.red { background: rgba(255,93,115,0.12); color: #ffd8de; }
.tag.orange { background: rgba(255,171,74,0.14); color: #ffe2bd; }
.tag.blue { background: rgba(122,167,255,0.13); color: #d9e5ff; }
.actions { display: flex; gap: 8px; }
.icon-btn {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border-radius: 13px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.075);
  color: var(--text);
  font-weight: 900;
}
.progress { height: 10px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; margin: 8px 0; }
.progress span { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--gold), var(--green)); width: 0%; }
.progress.danger span { background: linear-gradient(90deg, var(--orange), var(--red)); }
.empty-state { text-align: center; padding: 48px 18px; color: var(--muted); }
.empty-state h3 { color: var(--text); font-size: 24px; }
.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: grid;
  place-items: center;
  padding: 20px;
  background: rgba(0,0,0,0.62);
}
.modal { width: min(760px, 100%); max-height: 92vh; overflow: auto; border-radius: 28px; padding: 22px; }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.09); padding-bottom: 16px; margin-bottom: 14px; }
.modal-header h2 { margin: 0; letter-spacing: -0.04em; }
.modal-form { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0 14px; }
.modal-form label.full { grid-column: 1 / -1; }
.form-actions { grid-column: 1 / -1; display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; margin-top: 12px; }
.habit-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
.check-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px;
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-weight: 760;
}
.check-card input { width: auto; accent-color: var(--gold); }
.chart-bars { display: flex; gap: 12px; align-items: end; min-height: 170px; padding-top: 20px; }
.chart-bar { flex: 1; min-width: 28px; display: grid; align-content: end; gap: 8px; }
.chart-bar span { display: block; min-height: 4px; border-radius: 12px 12px 4px 4px; background: linear-gradient(180deg, var(--gold-2), var(--gold)); }
.chart-bar label { margin: 0; text-align: center; color: var(--muted); font-size: 11px; display: block; }

.community-shell { display: grid; gap: 18px; }
.community-hero {
  position: relative;
  overflow: hidden;
  min-height: 190px;
  display: grid;
  align-items: end;
  background:
    radial-gradient(circle at 15% 5%, rgba(245,197,66,.22), transparent 30%),
    radial-gradient(circle at 90% 12%, rgba(35,213,171,.16), transparent 28%),
    linear-gradient(135deg, rgba(255,255,255,.11), rgba(255,255,255,.045));
}
.community-hero::before { content:''; position:absolute; inset:0; background-image: linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px); background-size: 34px 34px; opacity:.35; pointer-events:none; }
.community-hero-content { position: relative; display: flex; justify-content: space-between; align-items: end; gap: 18px; flex-wrap: wrap; }
.community-hero h2 { margin: 4px 0 8px; font-size: clamp(34px, 5vw, 58px); letter-spacing: -.07em; }
.community-hero p { max-width: 680px; line-height: 1.7; }
.community-feed { display: grid; gap: 18px; max-width: 920px; }
.community-card { position: relative; overflow: hidden; padding: 0; border-color: rgba(255,255,255,.12); }
.community-card::before { content: ''; position: absolute; inset: -90px -110px auto auto; width: 260px; height: 260px; border-radius: 999px; background: radial-gradient(circle, rgba(245,197,66,.14), transparent 68%); pointer-events: none; }
.community-card-inner { position: relative; padding: 20px; display: grid; gap: 14px; }
.community-header { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
.community-author { display: flex; align-items: center; gap: 12px; min-width: 0; }
.community-avatar { width: 46px; height: 46px; border-radius: 16px; display: grid; place-items: center; font-weight: 950; color: #14100a; background: linear-gradient(135deg, var(--gold), var(--gold-2)); box-shadow: 0 12px 28px rgba(245,197,66,.18); }
.community-author b { display: block; letter-spacing: -.02em; }
.community-author span { display: block; margin-top: 2px; }
.community-tags { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.community-card h3 { margin: 2px 0 0; font-size: clamp(22px, 3vw, 30px); letter-spacing: -.045em; }
.community-body { color: var(--muted); line-height: 1.78; white-space: pre-wrap; font-size: 15px; }
.community-attachment { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px; border-radius: 18px; border: 1px solid rgba(255,255,255,.11); background: rgba(255,255,255,.055); }
.community-attachment b { display:block; color:var(--text); }
.community-footer { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding-top: 2px; color: var(--muted); }
.poll-box { display: grid; gap: 10px; padding: 14px; border-radius: 22px; background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.10); }
.poll-top { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:2px; }
.poll-options { display: grid; gap: 10px; }
.poll-option { position: relative; overflow: hidden; display: flex; justify-content: space-between; align-items: center; gap: 12px; width: 100%; border: 1px solid rgba(255,255,255,.13); background: rgba(8,11,18,.55); color: var(--text); padding: 14px 14px; border-radius: 18px; font-weight: 850; text-align: left; cursor: pointer; transition: .18s ease; }
.poll-option:hover { border-color: rgba(245,197,66,.48); transform: translateY(-1px); background: rgba(255,255,255,.075); }
.poll-option.selected { border-color: rgba(245,197,66,.65); background: rgba(245,197,66,.14); }
.poll-option[disabled] { opacity: .75; cursor: not-allowed; transform: none; }
.poll-fill { position:absolute; inset:0 auto 0 0; width: var(--pct, 0%); background: linear-gradient(90deg, rgba(245,197,66,.18), rgba(35,213,171,.09)); pointer-events:none; transition: width .28s ease; }
.poll-label, .poll-result { position:relative; z-index:1; }
.poll-label { display:flex; align-items:center; gap:10px; }
.poll-dot { width:10px; height:10px; border-radius:999px; background: rgba(255,255,255,.28); box-shadow: 0 0 0 4px rgba(255,255,255,.045); }
.poll-option.selected .poll-dot { background: var(--gold); box-shadow: 0 0 0 4px rgba(245,197,66,.16); }
.poll-result { display:flex; align-items:center; gap:8px; white-space:nowrap; color: var(--muted); font-size: 12px; font-weight: 900; }
.vote-cta { justify-self:start; display:inline-flex; align-items:center; gap:8px; margin-top:4px; padding:9px 12px; border-radius:999px; background:rgba(245,197,66,.10); border:1px solid rgba(245,197,66,.18); color:#ffe6a4; font-size:12px; font-weight:900; }
@media (max-width: 620px) { .community-card-inner { padding: 16px; } .community-header { align-items:flex-start; } .community-tags { width:100%; } .poll-option { align-items:flex-start; flex-direction:column; } .poll-result { width:100%; justify-content:space-between; } }

.toast {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 100;
  max-width: 360px;
  transform: translateY(120px);
  transition: 0.25s ease;
  padding: 14px 16px;
  border-radius: 16px;
  color: var(--text);
  background: rgba(8, 11, 18, 0.92);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: var(--shadow);
}
.toast.show { transform: translateY(0); }
.toast.success { border-color: rgba(56, 226, 139, 0.45); background: rgba(7, 32, 21, 0.96); }
.toast.error { border-color: rgba(255, 93, 115, 0.45); background: rgba(38, 9, 16, 0.96); }
.toast.warning { border-color: rgba(255, 171, 74, 0.45); background: rgba(38, 25, 8, 0.96); }
.mobile-nav { display: none; }

@media (max-width: 1100px) {
  .auth-screen { grid-template-columns: 1fr; }
  .auth-art { min-height: 360px; }
  .grid.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid.cols-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 860px) {
  .app-shell { grid-template-columns: 1fr; padding: 14px; }
  .sidebar { display: none; }
  .topbar { border-radius: 22px; }
  .user-pill { display: none; }
  .mobile-nav {
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 12px;
    z-index: 30;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    border-radius: 24px;
    padding: 8px;
  }
  .mobile-nav .nav-btn { padding: 10px 6px; display: grid; place-items: center; gap: 4px; font-size: 10px; text-align: center; min-width: 70px; }
  .mobile-nav .nav-icon { width: 28px; height: 28px; }
  .auth-screen { padding: 14px; }
  .auth-art { padding: 24px; border-radius: 28px; min-height: auto; }
  .auth-panel { border-radius: 28px; }
  .grid.cols-4, .grid.cols-3, .grid.cols-2 { grid-template-columns: 1fr; }
  .modal-form { grid-template-columns: 1fr; }
  .habit-grid { grid-template-columns: 1fr; }
}
@media (max-width: 520px) {
  .auth-art h1 { font-size: 42px; }
  .auth-stats { display: grid; }
  .tabs { grid-template-columns: repeat(2, 1fr); }
  .card { padding: 16px; border-radius: 20px; }
  .topbar h1 { font-size: 28px; }
}
.profit { color: var(--green); }
.loss { color: var(--red); }
pre { overflow-x: auto; }


/* ===== Mobile Responsiveness Patch ===== */
html, body { max-width: 100%; overflow-x: hidden; }
img, svg, video, canvas { max-width: 100%; height: auto; }
.card, .glass, .modal, .topbar, .community-card, .community-attachment, .poll-option { min-width: 0; }
button, .btn, .nav-btn, .tag { min-width: 0; }

/* =========================================================
   Professional Neumorphism UI Upgrade
   Structure + JavaScript untouched: visual CSS override only
   ========================================================= */
:root {
  --bg: #101421;
  --panel: #151a29;
  --panel-strong: #1a2032;
  --border: rgba(255, 255, 255, 0.055);
  --text: #f6f7fb;
  --muted: rgba(246, 247, 251, 0.62);
  --soft: #151a29;
  --gold: #f2c94c;
  --gold-2: #ffe08a;
  --green: #4ade80;
  --red: #fb7185;
  --orange: #fb923c;
  --blue: #93c5fd;
  --radius: 26px;
  --radius-sm: 18px;
  --neo-bg: #101421;
  --neo-surface: #151a29;
  --neo-surface-2: #1a2032;
  --neo-dark: rgba(0, 0, 0, 0.58);
  --neo-light: rgba(255, 255, 255, 0.07);
  --neo-line: rgba(255, 255, 255, 0.065);
  --neo-raised: 14px 14px 34px rgba(0,0,0,.46), -10px -10px 28px rgba(255,255,255,.045);
  --neo-soft-raised: 9px 9px 24px rgba(0,0,0,.40), -7px -7px 20px rgba(255,255,255,.04);
  --neo-inset: inset 8px 8px 18px rgba(0,0,0,.42), inset -7px -7px 16px rgba(255,255,255,.045);
  --neo-inset-soft: inset 4px 4px 10px rgba(0,0,0,.32), inset -4px -4px 10px rgba(255,255,255,.035);
  --shadow: var(--neo-raised);
}

body {
  background:
    radial-gradient(circle at 8% 8%, rgba(242, 201, 76, .12), transparent 30%),
    radial-gradient(circle at 90% 10%, rgba(147, 197, 253, .10), transparent 32%),
    radial-gradient(circle at 50% 100%, rgba(74, 222, 128, .07), transparent 35%),
    var(--neo-bg) !important;
  color: var(--text);
  letter-spacing: -0.01em;
}

.noise { opacity: .045; mix-blend-mode: soft-light; }
.hidden { display: none !important; }

.glass,
.card,
.auth-art,
.auth-panel,
.sidebar,
.topbar,
.modal,
.mobile-nav,
.toast {
  background: linear-gradient(145deg, #181e2f, #111625) !important;
  border: 1px solid var(--neo-line) !important;
  box-shadow: var(--neo-raised) !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}

.card,
.metric-card,
.community-card,
.poll-box,
.community-attachment,
.table-wrap,
.tabs,
.user-pill,
.check-card,
.progress {
  border-color: var(--neo-line) !important;
}

.card,
.metric-card,
.community-card {
  position: relative;
  overflow: hidden;
  background: linear-gradient(145deg, #171d2d, #121726) !important;
  box-shadow: var(--neo-soft-raised) !important;
}

.card::before,
.metric-card::before,
.auth-panel::before,
.sidebar::before,
.topbar::before {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: inherit;
  pointer-events: none;
  background: linear-gradient(145deg, rgba(255,255,255,.055), transparent 42%, rgba(0,0,0,.10));
}

.card > *,
.metric-card > *,
.auth-panel > *,
.sidebar > *,
.topbar > * { position: relative; z-index: 1; }

.auth-screen {
  background: transparent;
}

.auth-art {

  content: "";
  position: absolute;

  border-radius: 30px;

const $$ = (selector) => Array.from(document.querySelectorAll(selector));

function showToast(message, type = 'info') {
  const toast = $('#toast');
  toast.textContent = message;
  toast.className = `toast show ${type}`;
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove('show'), 3600);
}

function setAuthMessage(message = '', type = 'info') {
  const box = $('#authMessage');
  if (!box) return;
  if (!message) {
    box.textContent = '';
    box.className = 'auth-message hidden';
    return;
  }
  box.textContent = message;
  box.className = `auth-message ${type}`;
}

function setButtonLoading(button, isLoading, loadingText = 'Please wait...') {
  if (!button) return;
  if (isLoading) {
    button.dataset.originalText = button.dataset.originalText || button.textContent;
    button.disabled = true;
    button.textContent = loadingText;
  } else {
    button.disabled = false;
    button.textContent = button.dataset.originalText || button.textContent;
    delete button.dataset.originalText;
  }
}

function friendlyAuthError(error) {
  const code = error?.code || '';
  const raw = error?.message || 'Something went wrong. Please try again.';
  const map = {
    'auth/email-already-in-use': 'This email already has an account. Please login instead.',
    'auth/invalid-email': 'Enter a valid email address.',
    'auth/missing-email': 'Enter your email address.',
    'auth/missing-password': 'Enter your password.',
    'auth/weak-password': 'Password should be at least 6 characters.',
    'auth/invalid-credential': 'Email or password is incorrect.',
    'auth/user-not-found': 'No account found with this email. Please create an account first.',
    'auth/wrong-password': 'Password is incorrect.',
    'auth/too-many-requests': 'Too many attempts. Please wait a few minutes and try again.',
    'auth/network-request-failed': 'Network error. Check your internet connection.',
    'auth/operation-not-allowed': 'Email/password login is disabled in Firebase. Enable it from Authentication → Sign-in method.',
    'auth/unauthorized-domain': 'This domain is not authorized in Firebase Authentication. Add your domain in Firebase Auth settings or test with Firebase Hosting/localhost.',
    'permission-denied': 'Database permission denied. Publish the included firestore.rules file in Firebase.'
  };
  return map[code] || map[raw] || raw.replace(/^Firebase:\s*/i, '').replace(/\s*\([^)]*\)\.?$/i, '.');
}

function toNum(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function money(value, maxFractionDigits = 0) {
  const currency = state.currency || 'USD';
  const locale = currency === 'INR' ? 'en-IN' : 'en-US';
  try {
    return new Intl.NumberFormat(locale, {
      style: 'currency',
      currency,
      maximumFractionDigits: maxFractionDigits
    }).format(toNum(value));
  } catch {
    return `${currency} ${toNum(value).toLocaleString('en-US')}`;
  }
}

function pct(value) {
  return `${toNum(value).toFixed(1)}%`;
}

function escapeHTML(value = '') {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function clamp(value, min = 0, max = 100) {
  return Math.max(min, Math.min(max, value));
}

function getConfig() {
  const raw = localStorage.getItem(STORAGE_CONFIG);
  if (!raw) return DEFAULT_FIREBASE_CONFIG;
  try { return JSON.parse(raw); } catch { return DEFAULT_FIREBASE_CONFIG; }
}

async function loadFirebase(config) {
  const [appMod, authMod, firestoreMod] = await Promise.all([
    import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js'),
    import('https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js'),
    import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js')
  ]);

  const app = appMod.getApps().length ? appMod.getApp() : appMod.initializeApp(config);
  const auth = authMod.getAuth(app);
  const db = firestoreMod.getFirestore(app);

  state.firebase = { app, auth, db, authMod, firestoreMod };
  state.firebaseReady = true;

  authMod.onAuthStateChanged(auth, async (user) => {
    if (!user) {
      state.user = null;
      state.profile = null;
      state.data = initialData();
      stopListeners();
      stopPresenceTracking();
      showAuth();
      return;
    }
    try {
      state.user = user;
      await ensureUserProfile(user);
      subscribeFirestoreData();
      showApp();
    } catch (error) {
      console.error(error);
      setAuthMessage(friendlyAuthError(error), 'error');
      showToast(friendlyAuthError(error), 'error');
    }
  });
}

async function ensureUserProfile(user, name = '') {
  const { db, firestoreMod, auth, authMod } = state.firebase;
  const { doc, getDoc, setDoc, serverTimestamp } = firestoreMod;
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      name: name || user.displayName || 'Trader',
      email: user.email,
      currency: 'USD',
      createdAt: serverTimestamp(),
      lastSeen: serverTimestamp(),
      lastLoginAt: serverTimestamp(),
      status: 'active',
      banned: false,
      plan: 'free'
    });
    state.profile = { name: name || 'Trader', email: user.email, currency: 'USD', banned: false, status: 'active' };
  } else {
    state.profile = snap.data();
    if (state.profile?.banned || state.profile?.status === 'banned') {
      await authMod.signOut(auth);
      throw new Error(state.profile?.banReason ? `Your account has been banned. Reason: ${state.profile.banReason}` : 'Your account has been banned. Contact LBtradez support.');
    }
    const storedCurrency = state.profile.currency || 'USD';
    const shouldUpgradeDefaultCurrency = storedCurrency === 'INR' && !state.profile.currencyUpdatedAt;
    state.currency = shouldUpgradeDefaultCurrency ? 'USD' : storedCurrency;
    state.profile.currency = state.currency;
    await setDoc(ref, {
      email: user.email,
      lastSeen: serverTimestamp(),
      lastLoginAt: serverTimestamp(),
      online: true,
      ...(shouldUpgradeDefaultCurrency ? { currency: 'USD', currencyUpdatedAt: serverTimestamp() } : {})
    }, { merge: true });
  }
  startPresenceTracking();
}

function startPresenceTracking() {
  stopPresenceTracking();
  updatePresence();
  state.presenceTimer = setInterval(updatePresence, 60000);
}

function stopPresenceTracking() {
  if (state.presenceTimer) {
    clearInterval(state.presenceTimer);
    state.presenceTimer = null;
  }
}

async function updatePresence(extra = {}) {
  if (!state.user || !state.firebaseReady) return;
  try {
    const { db, firestoreMod } = state.firebase;
    const { doc, setDoc, serverTimestamp } = firestoreMod;
    await setDoc(doc(db, 'users', state.user.uid), {
      lastSeen: serverTimestamp(),
      online: document.visibilityState !== 'hidden',
      ...extra
    }, { merge: true });
  } catch (error) {
    console.warn('Presence update failed', error);
  }
}

function toMillis(value) {
  if (!value) return 0;
  if (typeof value.toMillis === 'function') return value.toMillis();
  if (typeof value.toDate === 'function') return value.toDate().getTime();
  if (typeof value.seconds === 'number') return value.seconds * 1000;
  if (typeof value === 'number') return value;
  const parsed = Date.parse(value);
  return Number.isFinite(parsed) ? parsed : 0;
}

function stopListeners() {
  state.unsubscribers.forEach(fn => {
    try { fn(); } catch {}
  });
  state.unsubscribers = [];
}

function subscribeFirestoreData() {
  if (!state.user || !state.firebaseReady) return;
  stopListeners();
  const { db, firestoreMod } = state.firebase;
  const { collection, onSnapshot, orderBy, query } = firestoreMod;
  const collections = ['fundedAccounts', 'trades', 'investments', 'income', 'habits', 'goals'];

  collections.forEach(name => {
    const ref = collection(db, 'users', state.user.uid, name);
    const q = query(ref, orderBy('createdAt', 'desc'));
    const unsub = onSnapshot(q, (snapshot) => {
      state.data[name] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      if (state.activePage) renderPage();
    }, (error) => {
      console.error(error);
      showToast(`Database error: ${error.message}`, 'error');
    });
    state.unsubscribers.push(unsub);
  });

  // Community feed is loaded without orderBy so posts still appear even if older admin posts
  // were created without a createdAt timestamp. We sort safely on the client.
  const communityRef = collection(db, 'communityPosts');
  const communityUnsub = onSnapshot(communityRef, async (snapshot) => {
    state.data.communityPosts = snapshot.docs
      .map(doc => ({ id: doc.id, ...doc.data() }))
      .sort((a, b) => toMillis(b.createdAt || b.updatedAt || b.date) - toMillis(a.createdAt || a.updatedAt || a.date));
    await loadMyCommunityVotes();
    if (state.activePage) renderPage();
  }, (error) => {
    console.error(error);
    showToast(`Community error: ${error.message}`, 'error');
  });
  state.unsubscribers.push(communityUnsub);
}

async function loadMyCommunityVotes() {
  if (!state.user || !state.firebaseReady) return;
  const posts = state.data.communityPosts || [];
  if (!posts.length) {
    state.data.communityVotes = {};
    state.data.communityVoteCounts = {};
    return;
  }
  const { db, firestoreMod } = state.firebase;
  const { collection, getDocs } = firestoreMod;
  const votePairs = await Promise.all(posts.map(async (post) => {
    try {
      const snap = await getDocs(collection(db, 'communityPosts', post.id, 'votes'));
      const counts = { total: 0 };
      let myVote = null;
      snap.docs.forEach(voteDoc => {
        const data = voteDoc.data();
        const optionId = data.optionId || data.option || '';
        if (!optionId) return;
        counts[optionId] = (counts[optionId] || 0) + 1;
        counts.total += 1;
        if (voteDoc.id === state.user.uid) myVote = optionId;
      });
      return [post.id, myVote, counts];
    } catch (error) {
      console.warn('Vote load failed', post.id, error);
      return [post.id, null, { total: 0 }];
    }
  }));
  state.data.communityVotes = Object.fromEntries(votePairs.filter(([, optionId]) => optionId).map(([postId, optionId]) => [postId, optionId]));
  state.data.communityVoteCounts = Object.fromEntries(votePairs.map(([postId, , counts]) => [postId, counts]));
}

async function voteCommunity(postId, optionId) {
  if (!state.user) throw new Error('Login required');
  const post = (state.data.communityPosts || []).find(p => p.id === postId);
  if (post && String(post.status || 'active').toLowerCase() === 'closed') throw new Error('This poll is closed.');
  const options = normalizePollOptions(post?.options || []);
  const option = options.find(item => String(item.id) === String(optionId));
  const { db, firestoreMod } = state.firebase;
  const { doc, setDoc, serverTimestamp } = firestoreMod;
  await setDoc(doc(db, 'communityPosts', postId, 'votes', state.user.uid), {
    optionId,
    optionText: option?.text || '',
    userEmail: state.user.email || '',
    votedAt: serverTimestamp()
  }, { merge: true });
  await loadMyCommunityVotes();
  renderPage();
  showToast('Vote saved successfully.', 'success');
}

function nextDate(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

async function saveItem(collectionName, item, id = null) {
  const { db, firestoreMod } = state.firebase;
  const { collection, doc, addDoc, setDoc, updateDoc, serverTimestamp } = firestoreMod;
  if (!state.user) throw new Error('Not logged in');
  if (id) {
    await updateDoc(doc(db, 'users', state.user.uid, collectionName, id), item);
  } else if (collectionName === 'habits') {
    await setDoc(doc(db, 'users', state.user.uid, collectionName, item.date), { ...item, createdAt: serverTimestamp() }, { merge: true });
  } else {
    await addDoc(collection(db, 'users', state.user.uid, collectionName), { ...item, createdAt: serverTimestamp() });
  }
}

async function deleteItem(collectionName, id) {
  if (!confirm('Delete this item?')) return;
  const { db, firestoreMod } = state.firebase;
  const { doc, deleteDoc } = firestoreMod;
  await deleteDoc(doc(db, 'users', state.user.uid, collectionName, id));

}

function calculations() {
  const accounts = state.data.fundedAccounts || [];
  const trades = state.data.trades || [];
  const investments = state.data.investments || [];
  const income = state.data.income || [];
  const habits = state.data.habits || [];

  const accountFees = accounts.reduce((sum, a) => sum + toNum(a.challengeFee), 0);
  const totalInvestments = investments.reduce((sum, x) => sum + toNum(x.amount), 0) + accountFees;
  const totalIncome = income.reduce((sum, x) => sum + toNum(x.amount), 0);
  const tradePnl = trades.reduce((sum, t) => sum + toNum(t.pnl), 0);
  const accountPnl = accounts.reduce((sum, a) => sum + (toNum(a.currentEquity) - toNum(a.startingBalance)), 0);
  const totalPnl = tradePnl + accountPnl;
  const netProfit = totalIncome + totalPnl - totalInvestments;
  const roi = totalInvestments ? (netProfit / totalInvestments) * 100 : 0;
  const totalCapital = accounts.reduce((sum, a) => sum + toNum(a.accountSize), 0);
  const currentEquity = accounts.reduce((sum, a) => sum + toNum(a.currentEquity), 0);
  const wins = trades.filter(t => t.result === 'win').length;
  const losses = trades.filter(t => t.result === 'loss').length;
  const breakeven = trades.filter(t => t.result === 'breakeven').length;
  const winRate = trades.length ? (wins / trades.length) * 100 : 0;
  const avgRisk = trades.length ? trades.reduce((sum, t) => sum + toNum(t.riskAmount), 0) / trades.length : 0;
  const habitScore = habits.length ? Math.round(habits.reduce((sum, h) => sum + toNum(h.score), 0) / habits.length) : 0;
  const activeAccounts = accounts.filter(a => ['active', 'funded', 'evaluation'].includes(a.status)).length;
  return { totalInvestments, totalIncome, tradePnl, accountPnl, totalPnl, netProfit, roi, totalCapital, currentEquity, wins, losses, breakeven, winRate, avgRisk, habitScore, activeAccounts };
}

function miniMetric(label, value, color = '') {
  return `<div class="card" style="padding:14px"><span class="tag ${color}">${label}</span><div style="font-size:22px;font-weight:900;margin-top:10px;letter-spacing:-.04em">${value}</div></div>`;
}

function renderRiskAlerts(accounts) {
  const alerts = accounts.map(a => {
    const start = toNum(a.startingBalance);
    const equity = toNum(a.currentEquity);
    const overall = toNum(a.overallDrawdown);
    if (!start || !overall) return null;
    const floor = start - overall;
    const remaining = equity - floor;
    const percentLeft = (remaining / overall) * 100;
    if (percentLeft <= 25) return `<p><span class="tag red">Danger</span> ${escapeHTML(a.propFirm)} has only ${money(remaining)} max loss left.</p>`;
    if (percentLeft <= 45) return `<p><span class="tag orange">Warning</span> ${escapeHTML(a.propFirm)} is near drawdown limit.</p>`;
    return null;
  }).filter(Boolean);
  return alerts.length ? alerts.join('') : '<p class="muted">No major risk warning right now.</p>';
}

function renderAccountCards(accounts) {
  if (!accounts.length) return emptyState('No funded accounts yet', 'Add your first prop firm or funded account to start tracking capital, equity and payout progress.');
  return `<div class="grid cols-3" style="margin-top:16px">${accounts.map(a => accountCard(a)).join('')}</div>`;
}

function accountCard(a) {
  const start = toNum(a.startingBalance);
  const equity = toNum(a.currentEquity);
  const target = toNum(a.profitTarget);
  const profit = equity - start;
  const progress = target ? clamp((profit / target) * 100) : 0;
  const lossFloor = start - toNum(a.overallDrawdown);
  const drawdownUsed = toNum(a.overallDrawdown) ? clamp(((start - equity) / toNum(a.overallDrawdown)) * 100) : 0;
  return `
    <div class="card">
      <div class="toolbar"><h3>${escapeHTML(a.propFirm || 'Funded Account')}</h3><span class="tag ${statusClass(a.status)}">${escapeHTML(a.status || 'active')}</span></div>
      <p class="muted">Size: <b>${money(a.accountSize)}</b> · Equity: <b>${money(a.currentEquity)}</b></p>
      <div class="tiny">Profit target progress: ${pct(progress)}</div>
      <div class="progress"><span style="width:${progress}%"></span></div>
      <div class="tiny">Drawdown used: ${pct(drawdownUsed)} · Floor ${money(lossFloor)}</div>

function communityTypeMeta(type = '') {
  const t = String(type || 'message').toLowerCase();
  if (t.includes('giveaway')) return { label: 'Giveaway', cls: 'green', icon: '🎁' };
  if (t.includes('poll')) return { label: 'Poll', cls: 'orange', icon: '📊' };
  if (t.includes('vote')) return { label: 'Vote', cls: 'orange', icon: '🗳️' };
  if (t.includes('update')) return { label: 'Update', cls: 'blue', icon: '⚡' };
  return { label: 'Message', cls: 'blue', icon: '📣' };
}

function formatCommunityDate(value) {
  if (!value) return '';
  const date = value?.toDate ? value.toDate() : new Date(value);
  if (Number.isNaN(date.getTime())) return '';
  return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}

function normalizePollOptions(options) {
  if (!options) return [];
  if (Array.isArray(options)) {
    return options.map((option, index) => {
      if (typeof option === 'string') return { id: `opt_${index + 1}_${option.toLowerCase().replace(/[^a-z0-9]+/g, '_').slice(0, 18)}`, text: option };
      return { id: option.id || option.value || option.text || `option_${index + 1}`, text: option.text || option.label || option.value || `Option ${index + 1}` };
    }).filter(option => option.text);
  }
  if (typeof options === 'object') {
    return Object.entries(options).map(([id, text]) => ({ id, text: typeof text === 'string' ? text : (text.text || text.label || id) })).filter(option => option.text);
  }
  return [];
}

  const counts = state.data.communityVoteCounts?.[post.id] || { total: 0 };
  const isPoll = ['Poll', 'Vote'].includes(meta.label) || options.length > 0;
  const totalVotes = counts.total || 0;
  return `
    <article class="card community-card">
      <div class="community-card-inner">

          <div class="community-author">

        ${isPoll ? renderPollOptions(post, options, selected, counts) : ''}
        <div class="community-footer">
          <span class="tiny">Official LBtradez community post</span>
          ${isPoll ? `<span class="tiny">${selected ? 'Your vote is saved' : 'Choose one option to vote'}</span>` : ''}

function renderPollOptions(post, options, selected, counts = { total: 0 }) {
  if (!options.length) return `<div class="poll-box"><p class="tiny">Voting options will appear here.</p></div>`;
  const total = counts.total || 0;
  const closed = String(post.status || 'active').toLowerCase() === 'closed';
  return `<div class="poll-box">
    <div class="poll-top">
      <b>${closed ? 'Poll closed' : selected ? 'Vote saved' : 'Cast your vote'}</b>
      <span class="tiny">${total} total vote${total === 1 ? '' : 's'}</span>
    </div>
    <div class="poll-options">
      ${options.map(option => {
        const count = counts[option.id] || 0;
        const pctValue = total ? Math.round((count / total) * 100) : 0;
        const isSelected = String(selected) === String(option.id);
        const resultText = selected || closed ? `${pctValue}% · ${count}` : 'Vote';
        return `
          <button class="poll-option ${isSelected ? 'selected' : ''}" ${closed ? 'disabled' : ''} data-community-vote="${escapeHTML(post.id)}" data-option-id="${escapeHTML(option.id)}">
            <span class="poll-fill" style="--pct:${pctValue}%"></span>
            <span class="poll-label"><span class="poll-dot"></span>${escapeHTML(option.text)}</span>
            <span class="poll-result">${isSelected ? '✓ ' : ''}${escapeHTML(resultText)}</span>
          </button>`;
      }).join('')}
    </div>
    <span class="vote-cta">${closed ? 'Voting is closed' : selected ? 'Tap another option to change your vote' : 'Select one option to vote'}</span>
  </div>`;
}

function habitStreak(habits) {
  const dates = new Set(habits.filter(h => toNum(h.score) >= 70).map(h => h.date));
  let streak = 0;
  const d = new Date();
  for (;;) {
    const iso = d.toISOString().slice(0, 10);
    if (!dates.has(iso)) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function groupTradePnlByDate(trades) {
  const map = new Map();
  trades.forEach(t => map.set(t.date || 'No date', (map.get(t.date || 'No date') || 0) + toNum(t.pnl)));
  return Array.from(map, ([date, pnl]) => ({ date: date.slice(5), pnl })).slice(-10);
}

function barChart(rows, labelKey, valueKey, suffix = '') {
  if (!rows.length) return emptyState('No data yet', 'Add trades or habits to generate analytics.');
  const max = Math.max(...rows.map(r => Math.abs(toNum(r[valueKey]))), 1);
  return `<div class="chart-bars">${rows.map(r => {
    const value = toNum(r[valueKey]);
    const h = clamp(Math.abs(value) / max * 150, 8, 150);
    return `<div class="chart-bar"><span style="height:${h}px; ${value < 0 ? 'background:linear-gradient(180deg,var(--red),var(--orange))' : ''}" title="${value}${suffix}"></span><label>${escapeHTML(r[labelKey])}<br>${value}${suffix}</label></div>`;
  }).join('')}</div>`;
}

      ['title', 'Title', 'text', ''], ['amount', 'Amount', 'number', ''], ['notes', 'Notes', 'textarea', '']
    ]
  },
  goals: {
    title: 'Goal', eyebrow: 'Target',
    fields: [
      ['title', 'Goal Title', 'text', 'Pass 10k funded account'], ['targetAmount', 'Target Amount', 'number', ''],
      ['currentAmount', 'Current Progress', 'number', ''], ['deadline', 'Deadline', 'date', ''],
      ['status', 'Status', 'select', ['active', 'completed', 'paused', 'failed']], ['notes', 'Notes', 'textarea', '']
    ]
  },
  habits: {
    title: 'Habit Log', eyebrow: 'Discipline',
    fields: [
      ['date', 'Date', 'date', todayISO()], ['score', 'Score', 'number', ''], ['notes', 'Notes', 'textarea', '']
    ]
  }
};

function openModal(collection, item = null) {
  const schema = formSchemas[collection];
  if (!schema) return;
  $('#modalEyebrow').textContent = schema.eyebrow;
  $('#modalTitle').textContent = `${item ? 'Edit' : 'Add'} ${schema.title}`;
  const fields = schema.fields.map(([name, label, type, options]) => renderField(name, label, type, options, item?.[name])).join('');
  $('#modalForm').innerHTML = `${fields}
    <div class="form-actions">
      <button class="btn ghost" type="button" id="cancelModalBtn">Cancel</button>
      <button class="btn primary" type="submit">Save ${schema.title}</button>
    </div>`;
  $('#modalForm').dataset.collection = collection;
  $('#modalForm').dataset.id = item?.id || '';
  $('#modalBackdrop').classList.remove('hidden');
}

function renderField(name, label, type, options, value) {
  const full = type === 'textarea' ? 'full' : '';
  const val = value ?? (Array.isArray(options) ? options[0] : options ?? '');
  if (type === 'select') {
    return `<label class="${full}">${label}<select name="${name}">${options.map(op => `<option value="${op}" ${val === op ? 'selected' : ''}>${op}</option>`).join('')}</select></label>`;
  }
  if (type === 'textarea') {
    return `<label class="full">${label}<textarea name="${name}" placeholder="${label}">${escapeHTML(val)}</textarea></label>`;
  }
  const step = type === 'number' ? ' step="any"' : '';
  return `<label class="${full}">${label}<input name="${name}" type="${type}" value="${escapeHTML(val)}"${step}></label>`;
}

function closeModal() {
  $('#modalBackdrop').classList.add('hidden');
  $('#modalForm').innerHTML = '';
}

function getItem(collection, id) {
  return (state.data[collection] || []).find(x => String(x.id) === String(id));
}

function serializeForm(form) {
  const data = new FormData(form);
  const obj = {};
  for (const [key, value] of data.entries()) obj[key] = value;
  form.querySelectorAll('input[type="number"]').forEach(input => { obj[input.name] = toNum(input.value); });
  return obj;
}

function handleHabitForm(form) {
  const checkedNames = ['followedPlan', 'avoidedOvertrade', 'journalDone', 'controlledRisk', 'reviewedMarket', 'avoidedRevenge', 'sleptProperly'];
  const item = { date: form.date.value, notes: form.notes.value };
  let count = 0;
  checkedNames.forEach(name => {
    item[name] = form.elements[name].checked;
    if (item[name]) count++;
  });
  item.score = Math.round((count / checkedNames.length) * 100);
  return item;
}

function initEvents() {
  const getEventElement = (event) => {
    let el = event.target;
    if (!el) return null;
    if (el.nodeType !== 1) el = el.parentElement;
    return el && typeof el.closest === 'function' ? el : null;
  };

  document.addEventListener('click', async (event) => {
    const el = getEventElement(event);
    if (!el) return;

    const tab = el.closest('[data-auth-tab]');
    if (tab) { setAuthTab(tab.dataset.authTab); return; }

    const mobileMenuBtn = el.closest('[data-mobile-menu]');
    if (mobileMenuBtn) { openMobileMenu(); return; }

    const mobileCloseBtn = el.closest('[data-mobile-close]');
    if (mobileCloseBtn || el.id === 'mobileMenuBackdrop') { closeMobileMenu(); return; }

    const mobileLogoutBtn = el.closest('[data-mobile-logout]');
    if (mobileLogoutBtn) {
      try {
        closeMobileMenu();
        await updatePresence({ online: false });
        await state.firebase.authMod.signOut(state.firebase.auth);
      } catch (e) { showToast(e.message, 'error'); }
      return;
    }

    const pageBtn = el.closest('[data-page]');
    if (pageBtn) { closeMobileMenu(); setPage(pageBtn.dataset.page); return; }

    const voteBtn = el.closest('[data-community-vote]');
    if (voteBtn) {
      try { await voteCommunity(voteBtn.dataset.communityVote, voteBtn.dataset.optionId); }
      catch (e) { showToast(e.message, 'error'); }
      return;
    }

    const openBtn = el.closest('[data-open-modal]');
    if (openBtn) { openModal(openBtn.dataset.openModal); return; }

    const editBtn = el.closest('[data-edit]');
    if (editBtn) { openModal(editBtn.dataset.edit, getItem(editBtn.dataset.edit, editBtn.dataset.id)); return; }

    const delBtn = el.closest('[data-delete]');
    if (delBtn) {
      try { await deleteItem(delBtn.dataset.delete, delBtn.dataset.id); }
      catch (e) { showToast(e.message, 'error'); }
      return;
    }

    if (el.id === 'closeModalBtn' || el.id === 'cancelModalBtn') closeModal();
  });

  $('#modalBackdrop').addEventListener('click', (event) => {
    if (event.target.id === 'modalBackdrop') closeModal();
  });

  $('#loginForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const submitBtn = event.submitter || event.target.querySelector('button[type="submit"]');
    try {
      setAuthMessage();
      if (!state.firebaseReady) throw new Error('Firebase is not ready. Check your internet connection and Firebase setup.');
      const email = $('#loginEmail').value.trim();
      const password = $('#loginPassword').value;
      if (!email) throw new Error('Enter your email address.');
      if (!password) throw new Error('Enter your password.');

      setButtonLoading(submitBtn, true, 'Logging in...');
      setAuthMessage('Checking your account...', 'info');

      const { auth, authMod } = state.firebase;
      const credential = await authMod.signInWithEmailAndPassword(auth, email, password);
      state.user = credential.user;
      await ensureUserProfile(credential.user);
      state.activePage = 'dashboard';
      subscribeFirestoreData();
      showToast('Login successful. Opening dashboard...', 'success');
      setAuthMessage('Login successful. Opening dashboard...', 'success');
      showApp();
    } catch (e) {
      const msg = friendlyAuthError(e);
      setAuthMessage(msg, 'error');
      showToast(msg, 'error');
    } finally {
      setButtonLoading(submitBtn, false);
    }
  });

  $('#signupForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const submitBtn = event.submitter || event.target.querySelector('button[type="submit"]');
    try {
      setAuthMessage();
      if (!state.firebaseReady) throw new Error('Firebase is not ready. Check your internet connection and Firebase setup.');
      const name = $('#signupName').value.trim();
      const email = $('#signupEmail').value.trim();
      const password = $('#signupPassword').value;
      const confirmPassword = $('#signupConfirm').value;
      if (name.length < 2) throw new Error('Enter your trader name.');
      if (!email) throw new Error('Enter your email address.');
      if (password.length < 6) throw new Error('Password should be at least 6 characters.');
      if (password !== confirmPassword) throw new Error('Passwords do not match.');

      setButtonLoading(submitBtn, true, 'Creating account...');
      setAuthMessage('Creating your LBtradez account...', 'info');

      const { auth, authMod } = state.firebase;
      const credential = await authMod.createUserWithEmailAndPassword(auth, email, password);
      await authMod.updateProfile(credential.user, { displayName: name });
      state.user = credential.user;
      await ensureUserProfile(credential.user, name);
      state.activePage = 'dashboard';
      subscribeFirestoreData();
      event.target.reset();
      showToast('Account created successfully. Opening dashboard...', 'success');
      setAuthMessage('Account created successfully. Opening dashboard...', 'success');
      showApp();
    } catch (e) {
      const msg = friendlyAuthError(e);
      setAuthMessage(msg, 'error');
      showToast(msg, 'error');
    } finally {
      setButtonLoading(submitBtn, false);
    }
  });

  $('#forgotPasswordBtn').addEventListener('click', async () => {
    try {
      setAuthMessage();
      if (!state.firebaseReady) throw new Error('Firebase is not ready. Check your internet connection and Firebase setup.');
      const email = $('#loginEmail').value.trim();
      if (!email) throw new Error('Enter your email first.');
      await state.firebase.authMod.sendPasswordResetEmail(state.firebase.auth, email);
      setAuthMessage('Password reset email sent. Check your inbox.', 'success');
      showToast('Password reset email sent.', 'success');
    } catch (e) {
      const msg = friendlyAuthError(e);
      setAuthMessage(msg, 'error');
      showToast(msg, 'error');
    }
  });

  $('#logoutBtn').addEventListener('click', async () => {
    try {
      await updatePresence({ online: false });
      await state.firebase.authMod.signOut(state.firebase.auth);
    } catch (e) { showToast(e.message, 'error'); }
  });

  $('#modalForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const form = event.target;
    const collection = form.dataset.collection;
    const id = form.dataset.id || null;
    try {
      await saveItem(collection, serializeForm(form), id);
      closeModal();
      showToast('Saved successfully');
    } catch (e) { showToast(e.message, 'error'); }
  });

  document.addEventListener('visibilitychange', () => updatePresence({ online: document.visibilityState !== 'hidden' }));
  window.addEventListener('focus', () => updatePresence({ online: true }));
  window.addEventListener('beforeunload', () => updatePresence({ online: false }));

  document.addEventListener('submit', async (event) => {
    if (event.target.id === 'habitForm') {
      event.preventDefault();
      try {
        const item = handleHabitForm(event.target);
        const existing = (state.data.habits || []).find(h => h.date === item.date);
        await saveItem('habits', item, existing?.id || null);
        showToast(`Habit saved. Score ${item.score}%`);
      } catch (e) { showToast(e.message, 'error'); }
    }
    if (event.target.id === 'settingsForm') {
      event.preventDefault();
      const form = event.target;
      state.currency = form.currency.value;
      state.profile = { ...(state.profile || {}), name: form.name.value, currency: form.currency.value };
      try {
        const { db, firestoreMod } = state.firebase;
        await firestoreMod.setDoc(firestoreMod.doc(db, 'users', state.user.uid), { name: form.name.value, currency: form.currency.value, currencyUpdatedAt: firestoreMod.serverTimestamp() }, { merge: true });
        showToast('Settings saved.');
      } catch (e) { showToast(e.message, 'error'); }
    }
  });
}

async function boot() {
  initEvents();
  renderNav();
  const config = getConfig();
  try {
    await loadFirebase(config);
    if (window.location.protocol === 'file:') {
      setAuthMessage('For real Firebase login/signup, open this app using VS Code Live Server, localhost, or Firebase Hosting. Direct file opening can be blocked by Firebase Auth.', 'warning');
    }
    showToast('Firebase loaded. Login or signup.', 'success');
  } catch (e) {
    console.error(e);
    const msg = 'Firebase could not load. Check internet and Firebase project settings.';
    setAuthMessage(msg, 'error');
    showToast(msg, 'error');
    showAuth();
  }
}

boot();

</script>
</body>
